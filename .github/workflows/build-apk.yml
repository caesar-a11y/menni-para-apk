name: Build Menni Para APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npx cap add android
      - name: Bump version code (block old installs)
        run: |
          sed -i -E 's/versionCode[[:space:]]+[0-9]+/versionCode 2/' android/app/build.gradle
          sed -i -E 's/versionName[[:space:]]+"[^"]*"/versionName "2.0"/' android/app/build.gradle
          grep -E "versionCode|versionName" android/app/build.gradle
      - run: npx cap sync android
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
      - run: cp android/app/build/outputs/apk/debug/app-debug.apk MenniPara.apk
      - uses: actions/upload-artifact@v4
        with:
          name: MenniPara-APK
          path: app/MenniPara.apk
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Menni Para APK (build ${{ github.run_number }})
          files: app/MenniPara.apk
