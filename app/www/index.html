function render(html){
  try{
    var doc=new DOMParser().parseFromString(html,'text/html');
    if(doc.title) document.title=doc.title;
    var hs=doc.querySelectorAll('head style, head link[rel="stylesheet"]');
    for(var i=0;i<hs.length;i++){document.head.appendChild(document.importNode(hs[i],true));}
    var scripts=[].slice.call(doc.querySelectorAll('script'));
    for(var j=0;j<scripts.length;j++){if(scripts[j].parentNode)scripts[j].parentNode.removeChild(scripts[j]);}
    document.body.innerHTML=doc.body.innerHTML;
    for(var k=0;k<scripts.length;k++){var n=document.createElement('script');if(scripts[k].src){n.src=scripts[k].src;}else{n.textContent=scripts[k].textContent;}document.body.appendChild(n);}
  }catch(e){document.body.innerHTML='<div style="padding:24px;font-size:16px">Load error: '+String(e)+'</div>';}
}
function fetchT(url,ms){return new Promise(function(res,rej){var done=false;var t=setTimeout(function(){if(!done){done=true;rej("timeout");}},ms);
  fetch(url,{cache:"no-store"}).then(function(r){return r.ok?r.text():Promise.reject("http"+r.status);}).then(function(x){if(!done){done=true;clearTimeout(t);res(x);}}).catch(function(e){if(!done){done=true;clearTimeout(t);rej(e);}});});}

  if(navigator.onLine){fetchT(HUB+'/apps/'+APP,7000).then(function(fresh){if(used)return;if(fresh&&fresh.length>3000&&fresh.indexOf("<html")>=0){used=true;try{localStorage.setItem(KEY,fresh);}catch(e){}go(fresh);}else offline();}).catch(offline);setTimeout(offline,7500);}else{offline();}})();
})();
